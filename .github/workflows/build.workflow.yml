name: Build Godot Plugin

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-plugin:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: ubuntu-latest
            platform: web
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: universal
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_32

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          repository: neogeek/rhythm-game-utilities
          fetch-depth: 0

      - name: Check out submodules
        run: |
          git submodule update --init

      - if: matrix.platform == 'linux'
        name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev libwayland-dev

      - if: matrix.platform == 'macos'
        name: Install dependencies (macOS)
        run: |
          brew install scons

      - if: matrix.platform == 'windows'
        name: Install dependencies (Windows)
        run: |
          python -m pip install scons
          choco install mingw

      - name: SCons Cache
        uses: actions/cache@v5
        with:
          path: |
            GodotPlugin/.scons_cache/
            GodotPlugin/.sconsign.dblite
            GodotPlugin/godot-cpp/bin/
            GodotPlugin/godot-cpp/gen/
          key: ${{ matrix.platform }}-${{ matrix.arch }}-scons-cache-${{ hashFiles('GodotPlugin/godot-cpp/**/*.cpp', 'GodotPlugin/godot-cpp/**/*.h') }}
          restore-keys: ${{ matrix.platform }}-${{ matrix.arch }}-scons-cache-

      - name: Build Plugin
        working-directory: GodotPlugin/
        shell: bash
        run: |
          scons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }}
          scons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: GodotPlugin/build/
          retention-days: 1

  sign-and-notarize:
    needs: build-plugin
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-macos-universal
          path: artifacts/

      - name: Sign and notarize generated files (macOS)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          ./bin/mac_sign_and_notarize.sh artifacts/addons/RhythmGameUtilities/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-macos-universal
          path: artifacts/
          retention-days: 1
          overwrite: true

  commit-changes:
    needs: [build-plugin, sign-and-notarize]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete existing build files
        run: |
          rm -rf addons/*

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./
          merge-multiple: true

      - name: Remove reloadable option from .gdextension config
        run: |
          sed -i '/reloadable/d' addons/RhythmGameUtilities/RhythmGameUtilities.gdextension

      - name: Setup git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Git commit changes
        run: |
          git pull
          git add addons/
          git commit -m "Updated build files [skip ci]" || exit 0
          git push
