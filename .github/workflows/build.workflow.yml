name: Build Godot Plugin

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-plugin:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: ubuntu-latest
            platform: web
            arch: wasm32
            scons-flags: threads=yes
          - os: ubuntu-latest
            platform: web
            arch: wasm32
            scons-flags: threads=no
          - os: macos-latest
            platform: macos
            arch: universal
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_32

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: neogeek/rhythm-game-utilities
          fetch-depth: 0

      - name: Check out submodules
        run: |
          git submodule update --init

      - if: matrix.os == 'ubuntu-latest'
        name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev libwayland-dev

      - if: matrix.os == 'ubuntu-latest' && matrix.platform == 'web'
        uses: HandcrankEngine/install-emscripten-package@36cc758cb3c58a74460fa8d033120d0f2b281005 # v0.2.0
        with:
          EMSDK_VERSION: "3.1.62"

      - if: matrix.os == 'macos-latest'
        name: Install dependencies (macOS)
        run: |
          brew install scons

      - if: matrix.os == 'windows-latest'
        name: Install dependencies (Windows)
        run: |
          python -m pip install scons
          choco install mingw

      - name: Store Scons Flag as HASH
        shell: bash
        run: |
          echo "SCONS_FLAGS_HASH=$(echo -n "${{ matrix.scons-flags || 'default' }}" | shasum -a 256 | cut -d ' ' -f 1)" >> $GITHUB_ENV

      - name: SCons Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            GodotPlugin/.scons_cache/
            GodotPlugin/.sconsign.dblite
            GodotPlugin/godot-cpp/bin/
            GodotPlugin/godot-cpp/gen/
          key: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.scons-flags && format('-{0}', env.SCONS_FLAGS_HASH) || '' }}-scons-cache-${{ hashFiles('GodotPlugin/godot-cpp/**/*.cpp', 'GodotPlugin/godot-cpp/**/*.h') }}
          restore-keys: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.scons-flags && format('-{0}', env.SCONS_FLAGS_HASH) || '' }}-scons-cache-

      - name: Build Plugin
        working-directory: GodotPlugin/
        shell: bash
        run: |
          scons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }} ${{ matrix.scons-flags }} --debug=explain
          scons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }} ${{ matrix.scons-flags }} --debug=explain

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.scons-flags && format('-{0}', env.SCONS_FLAGS_HASH) || '' }}
          path: GodotPlugin/build/
          retention-days: 1

  sign-and-notarize:
    strategy:
      matrix:
        framework_path:
          [
            "addons/RhythmGameUtilities/libRhythmGameUtilities.macos.template_debug.framework",
            "addons/RhythmGameUtilities/libRhythmGameUtilities.macos.template_release.framework",
          ]

    needs: build-plugin
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-macos-universal
          path: artifacts/

      - name: Sign and notarize generated files (macOS)
        uses: neogeek/sign-and-notarize@af2481fa5c971390851cd6d293a680af042b1d88 # v1.0.0
        with:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          FRAMEWORK_PATH: ${{ matrix.framework_path }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-macos-universal
          path: artifacts/
          retention-days: 1
          overwrite: true

  commit-changes:
    needs: [build-plugin, sign-and-notarize]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Delete existing build files
        run: |
          rm -rf addons/*

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./
          merge-multiple: true

      - name: Remove reloadable option from .gdextension config
        run: |
          sed -i '/reloadable/d' addons/RhythmGameUtilities/RhythmGameUtilities.gdextension

      - name: Setup git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Git commit changes
        run: |
          git pull
          git add addons/
          git commit -m "Updated build files [skip ci]" || exit 0
          git push
